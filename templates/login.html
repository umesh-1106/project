<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Wrong Parking Detection System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="row shadow-lg rounded overflow-hidden" style="max-width:900px; width:100%;">

        <!-- Left Side -->
        <div class="col-md-6 bg-primary text-white d-flex flex-column justify-content-center align-items-center p-5">

            <i class="bi bi-car-front-fill" style="font-size:80px;"></i>

            <h2 class="mt-4 text-center">
                Wrong Parking Detection System
            </h2>

            <p class="text-center mt-3">
                AI Based Vehicle Number Plate Detection using
                YOLOv8, EasyOCR, OpenCV and Flask
            </p>

        </div>

        <!-- Right Side -->
        <div class="col-md-6 bg-white p-5">

            <h3 class="text-center mb-4">
                Admin Login
            </h3>

            <form action="/login" method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="username"
                        placeholder="Enter Username"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Enter Password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    <i class="bi bi-box-arrow-in-right"></i>
                    Login

                </button>

            </form>

            <hr>

            <div class="text-center">

                <small class="text-muted">

                    Wrong Parking Detection System
                    <br>
                    Final Year Engineering Project

                </small>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
