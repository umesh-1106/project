<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Vehicle | Wrong Parking Detection System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚗 Wrong Parking Detection
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/camera">Live Camera</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/register">Register Vehicle</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/history">History</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Form -->

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>
                        Vehicle Registration
                    </h3>

                </div>

                <div class="card-body">

                    <form action="/register" method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Vehicle Number
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="vehicle_number"
                                    placeholder="TS09AB1234"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Owner Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="owner_name"
                                    placeholder="Enter Owner Name"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Mobile Number
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="phone"
                                    placeholder="9876543210"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Vehicle Type
                                </label>

                                <select
                                    class="form-select"
                                    name="vehicle_type"
                                    required>

                                    <option value="">Select</option>

                                    <option>Bike</option>

                                    <option>Car</option>

                                    <option>Auto</option>

                                    <option>Bus</option>

                                    <option>Truck</option>

                                </select>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Vehicle Color
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="vehicle_color"
                                placeholder="White">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Parking Zone
                            </label>

                            <select
                                class="form-select"
                                name="parking_zone">

                                <option>Zone A</option>
                                <option>Zone B</option>
                                <option>Zone C</option>
                                <option>Visitor Parking</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea
                                class="form-control"
                                rows="3"
                                name="address"
                                placeholder="Owner Address"></textarea>

                        </div>

                        <button
                            class="btn btn-success w-100">

                            <i class="bi bi-plus-circle-fill"></i>

                            Register Vehicle

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-primary text-white text-center p-3 mt-5">

© 2026 Wrong Parking Detection System

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
